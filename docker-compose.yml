services:
  booksplit:
    image: python:3.12-slim
    container_name: booksplit
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir fastapi uvicorn pymupdf python-multipart &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - /opt/booksplit/main.py:/app/main.py:ro
      - /opt/booksplit/data:/data
    environment:
      - DATA_DIR=/data
      # Uncomment to require a password (username can be anything):
      # - APP_PASSWORD=your-strong-password
    ports:
      - "8090:8000"
    restart: unless-stopped
